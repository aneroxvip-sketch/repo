<!DOCTYPE html>
<html lang="cs" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraviTraks Portál</title>
    <!-- AdSense script v sekci head pro správné schválení -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3562803852797893" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-image: url('https://i.imgur.com/lRMYm0K.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .dynamic-island { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col items-center">

    <header class="fixed top-6 z-50 flex justify-center p-2 pointer-events-none">
        <div id="dynamicIsland" class="dynamic-island shadow-lg border border-slate-100 flex items-center justify-center w-[160px] h-[50px] rounded-full px-4 py-2 pointer-events-auto">
            <img src="https://i.imgur.com/reQPbSU.png" alt="Logo" class="h-10 w-auto">
        </div>
    </header>

    <script>
        function showPage(pageId) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('explore-page').classList.add('hidden');
            document.getElementById(pageId).classList.remove('hidden');
        }
    </script>

    <main id="home-page" class="flex-grow pt-32 pb-16 px-4 flex flex-col items-center justify-center max-w-2xl w-full">
        <div class="glass-panel p-8 rounded-[40px] text-center w-full">
            <h1 class="text-4xl font-extrabold text-white mb-8">
                Moje Dráhy Z YT kanalu @GraviTraks
            </h1>
            <button onclick="showPage('explore-page')" class="bg-white/20 backdrop-blur-md text-white px-8 py-4 rounded-2xl font-bold hover:bg-white/30 transition-all flex items-center justify-center gap-2 mx-auto border border-white/20">
                Prozkoumat
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
    </main>

    <main id="explore-page" class="hidden flex-grow pt-32 pb-16 px-4 flex flex-col items-center justify-center max-w-2xl w-full">
        <div class="glass-panel p-8 rounded-[40px] text-center w-full">
            <h1 class="text-4xl font-extrabold text-white mb-2">Mega Draha V1</h1>
            <p class="text-white/70 text-sm mb-8 italic">(Není přímo jak na yt)</p>
            
            <div class="flex flex-col gap-4 mb-8 text-left">
                <label class="flex items-center gap-3 p-4 bg-white/10 rounded-2xl cursor-pointer hover:bg-white/20 transition-all">
                    <input type="radio" name="options" class="w-5 h-5 accent-orange-500">
                    <span class="font-medium text-white">10 reklam z AdSense Google</span>
                </label>
                <label class="flex items-center gap-3 p-4 bg-white/10 rounded-2xl cursor-pointer hover:bg-white/20 transition-all">
                    <input type="radio" name="options" class="w-5 h-5 accent-orange-500">
                    <span class="font-medium text-white">Red Basic +</span>
                </label>
            </div>

            <div class="mb-6">
                <span class="text-xs font-bold text-white/50 uppercase tracking-wider">Rank zatím nefunguje</span>
            </div>

            <div class="flex gap-4">
                <button onclick="showPage('home-page')" class="flex-1 bg-white/10 text-white py-4 rounded-2xl font-bold hover:bg-white/20 transition-all">
                    Zpět
                </button>
                <button class="flex-1 bg-orange-500 text-white py-4 rounded-2xl font-bold hover:bg-orange-600 transition-all shadow-lg shadow-orange-500/20">
                    ZÍSKAT
                </button>
            </div>
        </div>
    </main>

    <a href="https://www.youtube.com/channel/UCkATDDjcqBAL2xTcQpV2jFg" target="_blank" class="fixed bottom-8 right-8 w-20 h-20 rounded-3xl overflow-hidden shadow-2xl hover:scale-105 active:scale-95 transition-all z-50 bg-white border border-white/20 backdrop-blur-md flex flex-col items-center justify-center gap-1 group">
        <img src="https://i.imgur.com/OSWA7ez.png" alt="YouTube" class="w-10 h-10 object-contain">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400 group-hover:text-red-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
    </a>
</body>
</html>
